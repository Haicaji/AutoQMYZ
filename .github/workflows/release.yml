name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号，例如 v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Windows release package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}".Trim()
          } else {
            $version = "${{ github.ref_name }}".Trim()
          }

          if (-not $version.StartsWith("v")) {
            throw "版本号必须以 v 开头，例如 v1.0.0。当前输入: $version"
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Release version: $version"

      - name: Create tag for manual run
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          $existingTag = git tag --list $version
          if ($existingTag) {
            $tagSha = git rev-list -n 1 $version
            if ($tagSha -ne "${{ github.sha }}") {
              throw "Tag $version 已存在，但不指向当前提交。请换一个版本号。"
            }
            Write-Host "Tag $version already exists on this commit."
          } else {
            git tag $version
            git push origin $version
          }

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build AutoQMYZ.exe with PyInstaller
        shell: pwsh
        run: |
          $pyInstallerArgs = @(
            "--noconfirm",
            "--clean",
            "--onefile",
            "--name", "AutoQMYZ",
            "--collect-submodules", "AutoQMYZ",
            "--collect-submodules", "Crypto",
            "--collect-submodules", "fastapi",
            "--collect-submodules", "pydantic",
            "--collect-submodules", "selenium",
            "--collect-submodules", "uvicorn",
            "--collect-all", "fake_useragent",
            "--hidden-import", "toml",
            "--hidden-import", "uvicorn.logging",
            "--hidden-import", "uvicorn.loops.auto",
            "--hidden-import", "uvicorn.protocols.http.auto",
            "--hidden-import", "uvicorn.protocols.websockets.auto",
            "--hidden-import", "uvicorn.lifespan.on",
            "AutoQMYZ.py"
          )

          python -m PyInstaller @pyInstallerArgs

          if (-not (Test-Path "dist\AutoQMYZ.exe")) {
            throw "PyInstaller did not create dist\AutoQMYZ.exe"
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: WebUI/package-lock.json

      - name: Install frontend dependencies
        working-directory: WebUI
        run: npm ci

      - name: Build frontend
        working-directory: WebUI
        run: npm run build

      - name: Validate frontend assets are local
        shell: pwsh
        run: |
          if (-not (Test-Path "WebUI\dist\index.html")) {
            throw "WebUI build output missing: WebUI\dist\index.html"
          }

          $remotePatterns = @(
            "fonts.googleapis.com",
            "fonts.gstatic.com",
            "cdn.jsdelivr.net",
            "unpkg.com",
            "esm.sh",
            "skypack.dev"
          )

          $textFiles = Get-ChildItem "WebUI\dist" -Recurse -File |
            Where-Object { $_.Extension -in @(".html", ".js", ".css") }

          foreach ($pattern in $remotePatterns) {
            $matches = $textFiles | Select-String -Pattern $pattern -SimpleMatch
            if ($matches) {
              throw "WebUI dist still references remote frontend asset host: $pattern"
            }
          }

      - name: Download portable Chrome and ChromeDriver
        shell: pwsh
        run: |
          $metadataUrl = "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
          $metadata = Invoke-RestMethod -Uri $metadataUrl
          $stable = $metadata.channels.Stable
          $platform = "win64"

          $chromeUrl = ($stable.downloads.chrome | Where-Object { $_.platform -eq $platform } | Select-Object -First 1).url
          $driverUrl = ($stable.downloads.chromedriver | Where-Object { $_.platform -eq $platform } | Select-Object -First 1).url

          if (-not $chromeUrl -or -not $driverUrl) {
            throw "Cannot find Chrome for Testing download URLs for platform $platform"
          }

          Write-Host "Chrome for Testing version: $($stable.version)"
          Write-Host "Chrome URL: $chromeUrl"
          Write-Host "ChromeDriver URL: $driverUrl"

          New-Item -ItemType Directory -Force -Path "ChromeWithDriver" | Out-Null

          Invoke-WebRequest -Uri $chromeUrl -OutFile "chrome.zip"
          Expand-Archive -Path "chrome.zip" -DestinationPath "chrome_temp" -Force
          $chromeRoot = Get-ChildItem "chrome_temp" -Directory | Select-Object -First 1
          if (-not $chromeRoot) {
            throw "Chrome archive did not contain a directory"
          }
          Copy-Item -Path (Join-Path $chromeRoot.FullName "*") -Destination "ChromeWithDriver" -Recurse -Force

          Invoke-WebRequest -Uri $driverUrl -OutFile "chromedriver.zip"
          Expand-Archive -Path "chromedriver.zip" -DestinationPath "chromedriver_temp" -Force
          $driverExe = Get-ChildItem "chromedriver_temp" -Recurse -Filter "chromedriver.exe" | Select-Object -First 1
          if (-not $driverExe) {
            throw "ChromeDriver archive did not contain chromedriver.exe"
          }
          Copy-Item -Path $driverExe.FullName -Destination "ChromeWithDriver\chromedriver112.exe" -Force

          $stable.version | Out-File "ChromeWithDriver\chrome-version.txt" -Encoding utf8

          if (-not (Test-Path "ChromeWithDriver\stealth.min.js")) {
            throw "ChromeWithDriver\stealth.min.js is missing from the repository checkout"
          }
          if (-not (Test-Path "ChromeWithDriver\chrome.exe")) {
            throw "ChromeWithDriver\chrome.exe was not created"
          }
          if (-not (Test-Path "ChromeWithDriver\chromedriver112.exe")) {
            throw "ChromeWithDriver\chromedriver112.exe was not created"
          }

          Remove-Item "chrome.zip", "chromedriver.zip", "chrome_temp", "chromedriver_temp" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Assemble release package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $releaseRoot = "release-pkg"
          $pkgDir = Join-Path $releaseRoot "AutoQMYZ"
          $zipPath = "AutoQMYZ-$version.zip"

          if (Test-Path $releaseRoot) {
            Remove-Item $releaseRoot -Recurse -Force
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          New-Item -ItemType Directory -Force -Path "$pkgDir\Data\Question_data" | Out-Null
          New-Item -ItemType Directory -Force -Path "$pkgDir\Data\User" | Out-Null
          New-Item -ItemType Directory -Force -Path "$pkgDir\Data\logs" | Out-Null
          New-Item -ItemType Directory -Force -Path "$pkgDir\WebUI" | Out-Null

          Copy-Item "dist\AutoQMYZ.exe" "$pkgDir\AutoQMYZ.exe" -Force
          Copy-Item "AutoQMYZ.py" "$pkgDir\AutoQMYZ.py" -Force
          Copy-Item "AutoQMYZ" "$pkgDir\AutoQMYZ" -Recurse -Force
          Copy-Item "Data\Question_data\*" "$pkgDir\Data\Question_data" -Recurse -Force
          Copy-Item "WebUI\dist" "$pkgDir\WebUI\dist" -Recurse -Force
          Copy-Item "ChromeWithDriver" "$pkgDir\ChromeWithDriver" -Recurse -Force
          Copy-Item "config.toml.template" "$pkgDir\config.toml" -Force
          Copy-Item "config.toml.template" "$pkgDir\config.toml.template" -Force
          Copy-Item "README.md" "$pkgDir\README.md" -Force
          Copy-Item "requirements.txt" "$pkgDir\requirements.txt" -Force

          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "$pkgDir\LICENSE" -Force
          }

          Get-ChildItem "$pkgDir" -Recurse -Directory -Filter "__pycache__" | Remove-Item -Recurse -Force
          Get-ChildItem "$pkgDir" -Recurse -File -Include "*.pyc", "*.pyo", "debug.log" | Remove-Item -Force

          $requiredPaths = @(
            "$pkgDir\AutoQMYZ.exe",
            "$pkgDir\AutoQMYZ.py",
            "$pkgDir\AutoQMYZ\QingMYZMain.py",
            "$pkgDir\Data\Question_data",
            "$pkgDir\WebUI\dist\index.html",
            "$pkgDir\ChromeWithDriver\chrome.exe",
            "$pkgDir\ChromeWithDriver\chromedriver112.exe",
            "$pkgDir\ChromeWithDriver\stealth.min.js",
            "$pkgDir\config.toml",
            "$pkgDir\README.md"
          )

          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) {
              throw "Release package missing required path: $path"
            }
          }

          $questionFiles = Get-ChildItem "$pkgDir\Data\Question_data" -Filter "*.csv" -File
          if ($questionFiles.Count -lt 1) {
            throw "Release package has no question CSV files"
          }

          Compress-Archive -Path "$pkgDir\*" -DestinationPath $zipPath -Force

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipFullPath = (Resolve-Path $zipPath).Path
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipFullPath)
          try {
            $entries = $zip.Entries.FullName -replace '/', '\'
            foreach ($entry in @(
              "AutoQMYZ.exe",
              "Data\Question_data\$($questionFiles[0].Name)",
              "WebUI\dist\index.html",
              "ChromeWithDriver\chrome.exe",
              "ChromeWithDriver\chromedriver112.exe",
              "ChromeWithDriver\stealth.min.js",
              "config.toml",
              "README.md"
            )) {
              if ($entries -notcontains $entry) {
                throw "Zip missing required entry: $entry"
              }
            }
          } finally {
            $zip.Dispose()
          }

          Write-Host "Created $zipPath"
          Get-ChildItem $zipPath | Format-List Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoQMYZ-${{ steps.version.outputs.VERSION }}
          path: AutoQMYZ-${{ steps.version.outputs.VERSION }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: AutoQMYZ ${{ steps.version.outputs.VERSION }}
          body: |
            ## AutoQMYZ ${{ steps.version.outputs.VERSION }}

            ### 使用方法
            1. 下载 `AutoQMYZ-${{ steps.version.outputs.VERSION }}.zip`
            2. 解压到任意英文路径目录
            3. 编辑 `config.toml`，填入 AI API 配置
            4. 双击 `AutoQMYZ.exe`
            5. 浏览器打开 http://127.0.0.1:8000

            ### 包含内容
            - AutoQMYZ.exe，基于 Python 3.12 构建
            - 本地编译后的 WebUI 静态资源
            - Data/Question_data 题库
            - 便携版 Chrome for Testing 与匹配 ChromeDriver
            - ChromeWithDriver/stealth.min.js 反检测脚本
            - README.md、LICENSE、配置模板
          files: AutoQMYZ-${{ steps.version.outputs.VERSION }}.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
